<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} — Sébastien Degodez</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link
    href="https://fonts.bunny.net/css?family=Lato:400,700,900|Fira+Code:400,700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  />
  <link rel="stylesheet" href="/assets/css/tech-glass.css" />
  <link rel="stylesheet" href="/design-tokens.css" />
  <style>
    /* ============================================================
       HERO
       ============================================================ */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 2rem 4rem;
      overflow: hidden;
    }
    .hero__bg {
      position: absolute;
      inset: 0;
      background-image: url('https://raw.githubusercontent.com/SebastienDegodez/slide-marp/refs/heads/main/presentation/images/bg.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.7;
      z-index: 0;
    }
    .hero__content {
      position: relative;
      z-index: 1;
      max-width: 820px;
    }
    .hero__avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--color-highlight);
      margin-bottom: 1.5rem;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--color-foreground);
      line-height: 1.1;
    }
    .hero__role {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 400;
      color: var(--color-highlight);
      margin-top: 0.5rem;
    }
    .hero__tagline {
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: var(--color-dimmed);
      margin-top: 0.75rem;
      font-style: italic;
      max-width: 540px;
      margin-left: auto;
      margin-right: auto;
    }
    .hero__links {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-top: 2rem;
      font-size: 1rem;
    }
    .hero__links a {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      padding: 0.45em 1.1em;
      border: 1px solid var(--color-highlight);
      border-radius: var(--radius);
      color: var(--color-highlight);
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: background var(--transition), color var(--transition);
      text-decoration: none;
    }
    .hero__links a:hover {
      background: var(--color-highlight);
      color: var(--color-background);
      text-decoration: none;
      opacity: 1;
    }
    .hero__links a.hero__links--cta {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: var(--color-foreground);
    }
    .hero__links a.hero__links--cta:hover {
      background: var(--color-highlight);
      border-color: var(--color-highlight);
      color: var(--color-background);
    }
    .hero__scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      color: var(--color-dimmed);
      font-size: 0.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(6px); }
    }

    /* ============================================================
       BENTO BOX HIGHLIGHTS
       ============================================================ */
    .bento-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 5rem 2rem;
    }
    .bento-section__header {
      margin-bottom: 2.5rem;
    }
    .bento-section__title {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--color-foreground);
      margin-bottom: 0.3rem;
    }
    .bento-section__title span { color: var(--color-highlight); }
    .bento-section__subtitle {
      color: var(--color-dimmed);
      font-size: 1rem;
    }

    .bento-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: auto auto;
      gap: 1.25rem;
    }
    @media (max-width: 900px) {
      .bento-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .bento-grid { grid-template-columns: 1fr; }
    }

    .bento-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-card);
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: border-color var(--motion-fast), background var(--motion-fast), box-shadow var(--motion-fast), transform var(--motion-fast);
    }
    .bento-card:hover {
      border-color: var(--glass-border-strong);
      background: rgba(9, 25, 36, 0.46);
      box-shadow: var(--glass-shadow-hover);
      transform: translateY(-2px);
    }
    .bento-card--wide {
      grid-column: span 2;
    }
    @media (max-width: 600px) {
      .bento-card--wide { grid-column: span 1; }
    }
    .bento-card__icon {
      font-size: 1.5rem;
      color: var(--color-highlight);
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(139, 229, 177, 0.1);
      border-radius: var(--radius);
    }
    .bento-card__label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--color-dimmed);
    }
    .bento-card__title {
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--color-foreground);
      line-height: 1.3;
    }
    .bento-card__body {
      font-size: 0.9rem;
      color: var(--color-dimmed);
      line-height: 1.55;
    }
    .bento-card__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.25rem;
    }
    .bento-card__link {
      display: inline-flex;
      align-items: center;
      gap: 0.3em;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--color-highlight);
      margin-top: auto;
    }
    .bento-card__link:hover { opacity: 0.75; text-decoration: underline; }

    /* ============================================================
       PAGE HEADER
       ============================================================ */
    .page-header {
      position: relative;
      padding: 7rem 2rem 4rem;
      text-align: center;
      overflow: hidden;
    }
    .page-header__bg {
      position: absolute;
      inset: 0;
      background-image: url('https://raw.githubusercontent.com/SebastienDegodez/slide-marp/refs/heads/main/presentation/images/bg.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.35;
      z-index: 0;
    }
    .page-header__content {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: 0 auto;
    }
    .page-header__eyebrow {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--color-highlight);
      margin-bottom: 0.75rem;
    }
    .page-header__title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--color-foreground);
      line-height: 1.1;
    }
    .page-header__subtitle {
      font-size: 1rem;
      color: var(--color-dimmed);
      margin-top: 1rem;
      font-style: italic;
    }

    /* ============================================================
       TOC (Table of Contents)
       ============================================================ */
    .toc {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 2rem 0;
    }
    .toc__list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      list-style: none;
    }
    .toc__list a {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      padding: 0.4em 1em;
      border: 1px solid var(--color-stripe);
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--color-dimmed);
      transition: border-color var(--transition), color var(--transition), background var(--transition);
    }
    .toc__list a:hover {
      border-color: var(--color-highlight);
      color: var(--color-highlight);
      background: rgba(139, 229, 177, 0.08);
      text-decoration: none;
      opacity: 1;
    }

    /* ============================================================
       SECTION générique
       ============================================================ */
    .section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 5rem 2rem;
    }
    .section + .section {
      border-top: 1px solid var(--color-stripe);
    }
    .section__header {
      margin-bottom: 2.5rem;
    }
    .section__eyebrow {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--color-highlight);
      margin-bottom: 0.4rem;
    }
    .section__title {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--color-foreground);
    }
    .section__title span { color: var(--color-highlight); }
    .section__subtitle {
      color: var(--color-dimmed);
      font-size: 1rem;
      margin-top: 0.3rem;
    }

    /* ============================================================
       PROJECT CARDS
       ============================================================ */
    .project-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .project-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-card);
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      padding: 1.75rem 2rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      transition: border-color var(--motion-fast), background var(--motion-fast), box-shadow var(--motion-fast), transform var(--motion-fast);
    }
    .project-card:hover {
      border-color: var(--glass-border-strong);
      background: rgba(9, 25, 36, 0.46);
      box-shadow: var(--glass-shadow-hover);
      transform: translateY(-2px);
    }
    .project-card__name {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--color-foreground);
      margin-bottom: 0.4rem;
    }
    .project-card__main h3 {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--color-foreground);
      margin-bottom: 0.4rem;
    }
    .project-card__main p {
      font-size: 0.95rem;
      color: var(--color-dimmed);
      line-height: 1.7;
      text-align: justify;
      margin-bottom: 0.8rem;
    }
    .project-card__main p:last-of-type {
      margin-bottom: 0;
    }
    .project-card__impact {
      display: inline-flex;
      align-items: center;
      gap: 0.35em;
      font-size: 0.78rem;
      font-weight: 700;
      color: #80cbc4;
      background: rgba(77, 182, 172, 0.12);
      border: 1px solid rgba(77, 182, 172, 0.25);
      border-radius: 4px;
      padding: 0.15em 0.6em;
      margin-bottom: 0.75rem;
      letter-spacing: 0.3px;
    }
    .project-card__desc {
      font-size: 0.92rem;
      color: var(--color-dimmed);
      line-height: 1.6;
    }
    .project-card__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.9rem;
    }
    .project-card__side {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5rem;
      min-width: 90px;
    }
    .project-card__date {
      font-size: 0.78rem;
      color: var(--color-dimmed);
      white-space: nowrap;
    }
    .project-card__link {
      display: inline-flex;
      align-items: center;
      gap: 0.3em;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--color-highlight);
    }
    @media (max-width: 600px) {
      .project-card {
        grid-template-columns: 1fr;
      }
      .project-card__side {
        flex-direction: row;
        align-items: center;
        min-width: unset;
      }
    }

    /* ============================================================
       TAGS utilitaires
       ============================================================ */
    .tag {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.2em 0.6em;
      border-radius: 4px;
      background: rgba(78, 213, 138, 0.2);
      color: var(--color-highlight);
      border: 1px solid rgba(139, 229, 177, 0.25);
      letter-spacing: 0.3px;
    }
    .tag--green {
      background: rgba(77, 182, 172, 0.2);
      color: #80cbc4;
      border-color: rgba(77, 182, 172, 0.3);
    }
    .tag--orange {
      background: rgba(255, 167, 38, 0.15);
      color: #ffca28;
      border-color: rgba(255, 167, 38, 0.3);
    }

    /* ============================================================
       TALKS LIST
       ============================================================ */
    .talks-list {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .talk-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-left: 3px solid var(--color-highlight);
      border-radius: 0 var(--radius-card) var(--radius-card) 0;
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(calc(var(--glass-blur) * 0.85));
      -webkit-backdrop-filter: blur(calc(var(--glass-blur) * 0.85));
      padding: 1.25rem 1.5rem;
      display: flex;
      gap: 1.25rem;
      align-items: flex-start;
      transition: border-color var(--motion-fast), background var(--motion-fast), box-shadow var(--motion-fast);
    }
    .talk-card:hover {
      border-left-color: var(--color-primary);
      background: rgba(9, 25, 36, 0.46);
      box-shadow: var(--glass-shadow-hover);
    }
    .talk-card__icon {
      font-size: 1.3rem;
      color: var(--color-highlight);
      margin-top: 0.15rem;
      flex-shrink: 0;
    }
    .talk-card__title {
      font-size: 1rem;
      font-weight: 900;
      color: var(--color-foreground);
      margin-bottom: 0.25rem;
    }
    .talk-card__body h3 {
      font-size: 1rem;
      font-weight: 900;
      color: var(--color-foreground);
      margin-bottom: 0.25rem;
    }
    .talk-card__meta {
      font-size: 0.82rem;
      color: var(--color-dimmed);
      margin-bottom: 0.5rem;
    }
    .talk-card__meta strong {
      color: var(--color-highlight);
    }
    .talk-card__desc {
      font-size: 0.88rem;
      color: var(--color-dimmed);
      line-height: 1.55;
    }
    .talk-card__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.6rem;
    }

    /* ============================================================
       MENTORING LIST
       ============================================================ */
    .mentoring-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }
    .mentoring-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-card);
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(calc(var(--glass-blur) * 0.85));
      -webkit-backdrop-filter: blur(calc(var(--glass-blur) * 0.85));
      padding: 1.5rem;
      transition: border-color var(--motion-fast), background var(--motion-fast), box-shadow var(--motion-fast), transform var(--motion-fast);
    }
    .mentoring-card:hover {
      border-color: var(--glass-border-strong);
      background: rgba(9, 25, 36, 0.46);
      box-shadow: var(--glass-shadow-hover);
      transform: translateY(-2px);
    }
    .mentoring-card__icon {
      font-size: 1.4rem;
      color: var(--color-highlight);
      margin-bottom: 0.75rem;
    }
    .mentoring-card__title {
      font-size: 1.05rem;
      font-weight: 900;
      color: var(--color-foreground);
      margin-bottom: 0.5rem;
    }
    .mentoring-card h3 {
      font-size: 1.05rem;
      font-weight: 900;
      color: var(--color-foreground);
      margin-bottom: 0.5rem;
    }
    .mentoring-card__desc {
      font-size: 0.88rem;
      color: var(--color-dimmed);
      line-height: 1.55;
    }
  </style>
</head>
<body>

  <!-- ============================================================
       NAVIGATION
       ============================================================ -->
  <nav class="site-nav" aria-label="Navigation principale">
    <button class="nav-burger" id="navBurger" aria-label="Menu">
      <i class="fa-solid fa-bars"></i>
    </button>
    <div class="nav-links" id="navLinks">
      {% for item in site.data.nav %}
        {% if item.dropdown %}
        <div class="nav-dropdown" data-dropdown>
          <button class="nav-dropdown__trigger">
            <i class="{{ item.icon }}" aria-hidden="true"></i> {{ item.label }}
            <i class="fa-solid fa-chevron-down" aria-hidden="true"></i>
          </button>
          <div class="nav-dropdown__menu">
            {% for sub in item.items %}
            <a href="{{ sub.url }}"><i class="{{ sub.icon }}" aria-hidden="true"></i> {{ sub.label }}</a>
            {% endfor %}
          </div>
        </div>
        {% else %}
        <a href="{{ item.url }}"{% if page.url == '/' and item.label == 'Accueil' or page.url contains 'presentations' and item.label == 'Presentations' or page.url contains 'brag' and item.label == 'Brag Document' %} class="active" aria-current="page"{% endif %}>
          <i class="{{ item.icon }}" aria-hidden="true"></i> {{ item.label }}
        </a>
        {% endif %}
      {% endfor %}
    </div>
  </nav>

  <script>
    document.getElementById('navBurger')?.addEventListener('click', () => {
      document.getElementById('navLinks')?.classList.toggle('open');
    });
    document.querySelectorAll('[data-dropdown]').forEach(dd => {
      dd.querySelector('.nav-dropdown__trigger')?.addEventListener('click', e => {
        e.stopPropagation();
        document.querySelectorAll('[data-dropdown]').forEach(o => { if (o !== dd) o.classList.remove('open'); });
        dd.classList.toggle('open');
      });
    });
    document.addEventListener('click', () => {
      document.querySelectorAll('[data-dropdown]').forEach(d => d.classList.remove('open'));
    });

    const mermaidSyntaxPattern = /Syntax error in text/i;
    const mermaidVersionPattern = /mermaid version\s+\d+\.\d+\.\d+/i;
    document.querySelectorAll('pre, code, .mermaid, p, li, div').forEach(node => {
      const text = (node.textContent || '').trim();
      if (!text || text.length > 220 || node.dataset.mermaidErrorFixed === 'true') return;
      if (mermaidSyntaxPattern.test(text) && mermaidVersionPattern.test(text)) {
        node.dataset.mermaidErrorFixed = 'true';
        node.innerHTML = '<strong>Diagramme Mermaid indisponible.</strong> Le texte du diagramme contient une erreur de syntaxe. Corrigez la definition Mermaid puis rechargez la page.';
      }
    });
  </script>

  {{ content }}

  <!-- ============================================================
       FOOTER
       ============================================================ -->
  <footer>
    <p>
      © 2025 Sébastien Degodez —
      <a href="https://github.com/SebastienDegodez" target="_blank" rel="noopener">
        <i class="fa-brands fa-github" aria-hidden="true"></i> GitHub
      </a>
      ·
      <a href="https://www.linkedin.com/in/sebastien-degodez" target="_blank" rel="noopener">
        <i class="fa-brands fa-linkedin" aria-hidden="true"></i> LinkedIn
      </a>
      ·
      <a href="https://twitter.com/seb2goxdev" target="_blank" rel="noopener">
        <i class="fa-brands fa-x-twitter" aria-hidden="true"></i> seb2goxdev
      </a>
    </p>
    <p style="margin-top:0.4rem;">Design personnalisé inspiré de mes présentations techniques.</p>
  </footer>

</body>
</html>
