<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} — Sébastien Degodez</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link
    href="https://fonts.bunny.net/css?family=Lato:400,700,900|Fira+Code:400,700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  />
  <link rel="stylesheet" href="/design-tokens.css" />
  <style>
    /* ============================================================
       THEME — Tech Glass (inspire des presentations)
       ============================================================ */
    :root {
      --color-background: #0e1618;
      --color-foreground: #e9f7ef;
      --color-primary:    #4ed58a;
      --color-highlight:  #8be5b1;
      --color-dimmed:     #b8d0c1;
      --color-stripe:     rgba(139, 229, 177, 0.14);
      --gradient-overlay: linear-gradient(
        135deg,
        rgba(78, 213, 138, 0.08) 0%,
        rgba(78, 213, 138, 0.03) 50%,
        rgba(0, 0, 0, 0) 50%,
        rgba(0, 0, 0, 0.2) 100%
      );
      --font-sans: Lato, 'Avenir Next', Avenir, 'Trebuchet MS', 'Segoe UI', sans-serif;
      --font-mono: 'Fira Code', 'JetBrains Mono', 'SFMono-Regular', Menlo, monospace;
      --radius: 6px;
      --radius-card: 10px;
      --transition: 0.2s ease;

      /* Glass v2 defaults (override by design-tokens.css when present) */
      --glass-bg: rgba(15, 27, 24, 0.9);
      --glass-bg-strong: rgba(10, 20, 18, 0.95);
      --glass-border: rgba(139, 229, 177, 0.22);
      --glass-border-strong: rgba(139, 229, 177, 0.34);
      --glass-highlight: rgba(233, 247, 239, 0.12);
      --glass-shadow: 0 18px 60px rgba(0, 0, 0, 0.42);
      --glass-shadow-hover: 0 24px 70px rgba(0, 0, 0, 0.55);
      --glass-blur: 14px;
      --motion-fast: 160ms ease;
      --motion-medium: 260ms ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--color-background);
      background-image: radial-gradient(circle at 80% 10%, rgba(78, 213, 138, 0.12), transparent 28%), var(--gradient-overlay);
      color: var(--color-foreground);
      font-family: var(--font-sans);
      font-size: 18px;
      line-height: 1.65;
      letter-spacing: 0.2px;
    }
    a {
      color: var(--color-highlight);
      text-decoration: none;
      transition: opacity var(--transition);
    }
    a:hover { opacity: 0.8; text-decoration: underline; }

    /* ============================================================
       GLASS PRIMITIVES
       ============================================================ */
    .glass-nav,
    .glass-surface,
    .glass-card,
    .glass-chip {
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
    }
    .glass-card {
      border-radius: var(--radius-card);
      transition: transform var(--motion-fast), border-color var(--motion-fast), box-shadow var(--motion-fast), background var(--motion-fast);
    }
    .glass-card:hover {
      border-color: var(--glass-border-strong);
      box-shadow: var(--glass-shadow-hover);
      transform: translateY(-2px);
    }
    .glass-chip {
      border-radius: 999px;
      background: rgba(139, 229, 177, 0.12);
      border-color: rgba(139, 229, 177, 0.28);
      box-shadow: none;
      backdrop-filter: blur(calc(var(--glass-blur) * 0.55));
      -webkit-backdrop-filter: blur(calc(var(--glass-blur) * 0.55));
    }
    @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
      .glass-nav,
      .glass-surface,
      .glass-card,
      .glass-chip {
        background: var(--glass-bg-strong);
        border-color: var(--glass-border-strong);
      }
    }

    /* ============================================================
       NAVIGATION
       ============================================================ */
    .site-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      padding: 0.75rem 2rem;
      background: var(--glass-bg-strong);
      border-bottom: 1px solid var(--glass-border);
      box-shadow: 0 8px 28px rgba(4, 12, 18, 0.28);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
    }
    .site-nav a {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--color-dimmed);
      padding: 0.3em 0.75em;
      border-radius: var(--radius);
      transition: color var(--motion-fast), background var(--motion-fast), transform var(--motion-fast), border-color var(--motion-fast);
      border: 1px solid transparent;
    }
    .site-nav a:hover,
    .site-nav a.active {
      color: var(--color-foreground);
      background: rgba(139, 229, 177, 0.16);
      border-color: rgba(139, 229, 177, 0.28);
      transform: translateY(-1px);
      text-decoration: none;
      opacity: 1;
    }
    .site-nav a.active { color: var(--color-highlight); }

    /* ============================================================
       HERO
       ============================================================ */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 2rem 4rem;
      overflow: hidden;
    }
    .hero__bg {
      position: absolute;
      inset: 0;
      background-image: url('https://raw.githubusercontent.com/SebastienDegodez/slide-marp/refs/heads/main/presentation/images/bg.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.7;
      z-index: 0;
    }
    .hero__content {
      position: relative;
      z-index: 1;
      max-width: 820px;
    }
    .hero__avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--color-highlight);
      margin-bottom: 1.5rem;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--color-foreground);
      line-height: 1.1;
    }
    .hero__role {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 400;
      color: var(--color-highlight);
      margin-top: 0.5rem;
    }
    .hero__tagline {
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: var(--color-dimmed);
      margin-top: 0.75rem;
      font-style: italic;
      max-width: 540px;
      margin-left: auto;
      margin-right: auto;
    }
    .hero__links {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-top: 2rem;
      font-size: 1rem;
    }
    .hero__links a {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      padding: 0.45em 1.1em;
      border: 1px solid var(--color-highlight);
      border-radius: var(--radius);
      color: var(--color-highlight);
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: background var(--transition), color var(--transition);
      text-decoration: none;
    }
    .hero__links a:hover {
      background: var(--color-highlight);
      color: var(--color-background);
      text-decoration: none;
      opacity: 1;
    }
    .hero__links a.hero__links--cta {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: var(--color-foreground);
    }
    .hero__links a.hero__links--cta:hover {
      background: var(--color-highlight);
      border-color: var(--color-highlight);
      color: var(--color-background);
    }
    .hero__scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      color: var(--color-dimmed);
      font-size: 0.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(6px); }
    }

    /* ============================================================
       BENTO BOX HIGHLIGHTS
       ============================================================ */
    .bento-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 5rem 2rem;
    }
    .bento-section__header {
      margin-bottom: 2.5rem;
    }
    .bento-section__title {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--color-foreground);
      margin-bottom: 0.3rem;
    }
    .bento-section__title span { color: var(--color-highlight); }
    .bento-section__subtitle {
      color: var(--color-dimmed);
      font-size: 1rem;
    }

    .bento-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: auto auto;
      gap: 1.25rem;
    }
    @media (max-width: 900px) {
      .bento-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .bento-grid { grid-template-columns: 1fr; }
    }

    .bento-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-card);
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: border-color var(--motion-fast), background var(--motion-fast), box-shadow var(--motion-fast), transform var(--motion-fast);
    }
    .bento-card:hover {
      border-color: var(--glass-border-strong);
      background: rgba(9, 25, 36, 0.46);
      box-shadow: var(--glass-shadow-hover);
      transform: translateY(-2px);
    }
    .bento-card--wide {
      grid-column: span 2;
    }
    @media (max-width: 600px) {
      .bento-card--wide { grid-column: span 1; }
    }
    .bento-card__icon {
      font-size: 1.5rem;
      color: var(--color-highlight);
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(139, 229, 177, 0.1);
      border-radius: var(--radius);
    }
    .bento-card__label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--color-dimmed);
    }
    .bento-card__title {
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--color-foreground);
      line-height: 1.3;
    }
    .bento-card__body {
      font-size: 0.9rem;
      color: var(--color-dimmed);
      line-height: 1.55;
    }
    .bento-card__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.25rem;
    }
    .bento-card__link {
      display: inline-flex;
      align-items: center;
      gap: 0.3em;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--color-highlight);
      margin-top: auto;
    }
    .bento-card__link:hover { opacity: 0.75; text-decoration: underline; }

    /* ============================================================
       PAGE HEADER
       ============================================================ */
    .page-header {
      position: relative;
      padding: 7rem 2rem 4rem;
      text-align: center;
      overflow: hidden;
    }
    .page-header__bg {
      position: absolute;
      inset: 0;
      background-image: url('https://raw.githubusercontent.com/SebastienDegodez/slide-marp/refs/heads/main/presentation/images/bg.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.35;
      z-index: 0;
    }
    .page-header__content {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: 0 auto;
    }
    .page-header__eyebrow {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--color-highlight);
      margin-bottom: 0.75rem;
    }
    .page-header__title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--color-foreground);
      line-height: 1.1;
    }
    .page-header__subtitle {
      font-size: 1rem;
      color: var(--color-dimmed);
      margin-top: 1rem;
      font-style: italic;
    }

    /* ============================================================
       TOC (Table of Contents)
       ============================================================ */
    .toc {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 2rem 0;
    }
    .toc__list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      list-style: none;
    }
    .toc__list a {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      padding: 0.4em 1em;
      border: 1px solid var(--color-stripe);
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--color-dimmed);
      transition: border-color var(--transition), color var(--transition), background var(--transition);
    }
    .toc__list a:hover {
      border-color: var(--color-highlight);
      color: var(--color-highlight);
      background: rgba(139, 229, 177, 0.08);
      text-decoration: none;
      opacity: 1;
    }

    /* ============================================================
       SECTION générique
       ============================================================ */
    .section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 5rem 2rem;
    }
    .section + .section {
      border-top: 1px solid var(--color-stripe);
    }
    .section__header {
      margin-bottom: 2.5rem;
    }
    .section__eyebrow {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--color-highlight);
      margin-bottom: 0.4rem;
    }
    .section__title {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--color-foreground);
    }
    .section__title span { color: var(--color-highlight); }
    .section__subtitle {
      color: var(--color-dimmed);
      font-size: 1rem;
      margin-top: 0.3rem;
    }

    /* ============================================================
       PROJECT CARDS
       ============================================================ */
    .project-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .project-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-card);
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      padding: 1.75rem 2rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      transition: border-color var(--motion-fast), background var(--motion-fast), box-shadow var(--motion-fast), transform var(--motion-fast);
    }
    .project-card:hover {
      border-color: var(--glass-border-strong);
      background: rgba(9, 25, 36, 0.46);
      box-shadow: var(--glass-shadow-hover);
      transform: translateY(-2px);
    }
    .project-card__name {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--color-foreground);
      margin-bottom: 0.4rem;
    }
    .project-card__main h3 {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--color-foreground);
      margin-bottom: 0.4rem;
    }
    .project-card__main p {
      font-size: 0.95rem;
      color: var(--color-dimmed);
      line-height: 1.7;
      text-align: justify;
      margin-bottom: 0.8rem;
    }
    .project-card__main p:last-of-type {
      margin-bottom: 0;
    }
    .project-card__impact {
      display: inline-flex;
      align-items: center;
      gap: 0.35em;
      font-size: 0.78rem;
      font-weight: 700;
      color: #80cbc4;
      background: rgba(77, 182, 172, 0.12);
      border: 1px solid rgba(77, 182, 172, 0.25);
      border-radius: 4px;
      padding: 0.15em 0.6em;
      margin-bottom: 0.75rem;
      letter-spacing: 0.3px;
    }
    .project-card__desc {
      font-size: 0.92rem;
      color: var(--color-dimmed);
      line-height: 1.6;
    }
    .project-card__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.9rem;
    }
    .project-card__side {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5rem;
      min-width: 90px;
    }
    .project-card__date {
      font-size: 0.78rem;
      color: var(--color-dimmed);
      white-space: nowrap;
    }
    .project-card__link {
      display: inline-flex;
      align-items: center;
      gap: 0.3em;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--color-highlight);
    }
    @media (max-width: 600px) {
      .project-card {
        grid-template-columns: 1fr;
      }
      .project-card__side {
        flex-direction: row;
        align-items: center;
        min-width: unset;
      }
    }

    /* ============================================================
       TAGS utilitaires
       ============================================================ */
    .tag {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.2em 0.6em;
      border-radius: 4px;
      background: rgba(78, 213, 138, 0.2);
      color: var(--color-highlight);
      border: 1px solid rgba(139, 229, 177, 0.25);
      letter-spacing: 0.3px;
    }
    .tag--green {
      background: rgba(77, 182, 172, 0.2);
      color: #80cbc4;
      border-color: rgba(77, 182, 172, 0.3);
    }
    .tag--orange {
      background: rgba(255, 167, 38, 0.15);
      color: #ffca28;
      border-color: rgba(255, 167, 38, 0.3);
    }

    /* ============================================================
       TALKS LIST
       ============================================================ */
    .talks-list {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .talk-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-left: 3px solid var(--color-highlight);
      border-radius: 0 var(--radius-card) var(--radius-card) 0;
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(calc(var(--glass-blur) * 0.85));
      -webkit-backdrop-filter: blur(calc(var(--glass-blur) * 0.85));
      padding: 1.25rem 1.5rem;
      display: flex;
      gap: 1.25rem;
      align-items: flex-start;
      transition: border-color var(--motion-fast), background var(--motion-fast), box-shadow var(--motion-fast);
    }
    .talk-card:hover {
      border-left-color: var(--color-primary);
      background: rgba(9, 25, 36, 0.46);
      box-shadow: var(--glass-shadow-hover);
    }
    .talk-card__icon {
      font-size: 1.3rem;
      color: var(--color-highlight);
      margin-top: 0.15rem;
      flex-shrink: 0;
    }
    .talk-card__title {
      font-size: 1rem;
      font-weight: 900;
      color: var(--color-foreground);
      margin-bottom: 0.25rem;
    }
    .talk-card__body h3 {
      font-size: 1rem;
      font-weight: 900;
      color: var(--color-foreground);
      margin-bottom: 0.25rem;
    }
    .talk-card__meta {
      font-size: 0.82rem;
      color: var(--color-dimmed);
      margin-bottom: 0.5rem;
    }
    .talk-card__meta strong {
      color: var(--color-highlight);
    }
    .talk-card__desc {
      font-size: 0.88rem;
      color: var(--color-dimmed);
      line-height: 1.55;
    }
    .talk-card__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.6rem;
    }

    /* ============================================================
       MENTORING LIST
       ============================================================ */
    .mentoring-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }
    .mentoring-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-card);
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(calc(var(--glass-blur) * 0.85));
      -webkit-backdrop-filter: blur(calc(var(--glass-blur) * 0.85));
      padding: 1.5rem;
      transition: border-color var(--motion-fast), background var(--motion-fast), box-shadow var(--motion-fast), transform var(--motion-fast);
    }
    .mentoring-card:hover {
      border-color: var(--glass-border-strong);
      background: rgba(9, 25, 36, 0.46);
      box-shadow: var(--glass-shadow-hover);
      transform: translateY(-2px);
    }
    .mentoring-card__icon {
      font-size: 1.4rem;
      color: var(--color-highlight);
      margin-bottom: 0.75rem;
    }
    .mentoring-card__title {
      font-size: 1.05rem;
      font-weight: 900;
      color: var(--color-foreground);
      margin-bottom: 0.5rem;
    }
    .mentoring-card h3 {
      font-size: 1.05rem;
      font-weight: 900;
      color: var(--color-foreground);
      margin-bottom: 0.5rem;
    }
    .mentoring-card__desc {
      font-size: 0.88rem;
      color: var(--color-dimmed);
      line-height: 1.55;
    }

    /* ============================================================
       FOOTER
       ============================================================ */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.85rem;
      color: var(--color-dimmed);
      border-top: 1px solid var(--color-stripe);
    }
    footer a { color: var(--color-highlight); }
  </style>
</head>
<body>

  <!-- ============================================================
       NAVIGATION
       ============================================================ -->
  <nav class="site-nav" aria-label="Navigation principale">
    <a href="{% link index.md %}"{% if page.url == '/' or page.url == '/index.html' %} class="active" aria-current="page"{% endif %}>
      <i class="fa-solid fa-house" aria-hidden="true"></i> Accueil
    </a>
    <a href="{% link presentations.md %}"{% if page.url contains 'presentations' %} class="active" aria-current="page"{% endif %}>
